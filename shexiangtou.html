<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄像头实时预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: #0f0f1e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1); /* 镜像显示 */
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,184,148,0.3);
        }

        .btn-stop {
            background: linear-gradient(135deg, #fd79a8 0%, #fdcb6e 100%);
            color: white;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(253,121,168,0.3);
        }

        .btn-capture {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
        }

        .btn-capture:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108,92,231,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            font-size: 14px;
        }

        .error {
            background: rgba(231, 76, 60, 0.2);
            color: #ff6b6b;
        }

        .success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        #canvas {
            display: none;
        }

        .gallery {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .placeholder {
            width: 100%;
            aspect-ratio: 4/3;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 4rem;
        }
    </style>
</head>
<body>
    <h1>📷 摄像头实时预览</h1>
    
    <div class="camera-container">
        <div class="placeholder" id="placeholder">
            <span>🎥</span>
        </div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn-start" id="startBtn" onclick="startCamera()">
            ▶️ 开启摄像头
        </button>
        <button class="btn-stop" id="stopBtn" onclick="stopCamera()" disabled>
            ⏹️ 关闭摄像头
        </button>
        <button class="btn-capture" id="captureBtn" onclick="capturePhoto()" disabled>
            📸 拍照
        </button>
    </div>

    <div class="status" id="status">点击"开启摄像头"开始使用</div>

    <div class="gallery" id="gallery"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const captureBtn = document.getElementById('captureBtn');
        const placeholder = document.getElementById('placeholder');
        const gallery = document.getElementById('gallery');
        
        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        facingMode: "user"
                    }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                placeholder.style.display = 'none';
                video.style.display = 'block';
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                captureBtn.disabled = false;
                
                status.textContent = '✅ 摄像头已开启';
                status.className = 'status success';
                
            } catch (err) {
                status.textContent = '❌ 错误: ' + err.message;
                status.className = 'status error';
                console.error('摄像头访问失败:', err);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
            }
            
            placeholder.style.display = 'flex';
            video.style.display = 'none';
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            captureBtn.disabled = true;
            
            status.textContent = '摄像头已关闭';
            status.className = 'status';
        }

        function capturePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1); // 镜像翻转回来保存
            ctx.drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/png');
            
            const img = document.createElement('img');
            img.src = imageData;
            img.title = '点击下载';
            img.onclick = () => {
                const link = document.createElement('a');
                link.download = `照片_${new Date().getTime()}.png`;
                link.href = imageData;
                link.click();
            };
            
            gallery.prepend(img);
            
            status.textContent = '✅ 照片已保存，点击图片可下载';
            status.className = 'status success';
            
            setTimeout(() => {
                status.textContent = '✅ 摄像头已开启';
            }, 2000);
        }

        // 页面关闭时自动停止摄像头
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
