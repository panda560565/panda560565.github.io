<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-title" content="双摄像头Pro">
    <title>双摄像头 Pro</title>
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi5Y+N5a2X5a+85YWz5Y+qUHJvIiwic2hvcnRfbmFtZSI6IuWPjeWtl+WvvOWFsyIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMDAwMDAwIiwidGhlbWVfY29sb3IiOiIjMDAwMDAwIn0=">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            touch-action: none;
            /* 关键：防止浏览器默认滚动和缩放 */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* 模拟全屏 - 占满整个可视区域 */
        #app {
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* 动态视口高度，适配移动端 */
            height: -webkit-fill-available; /* Safari 适配 */
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* 隐藏浏览器 UI 的hack */
        .fullscreen-hack {
            position: fixed;
            top: -100px;
            left: 0;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        /* 主视频层 - 全屏 */
        .main-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        #main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            gap: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 100%);
        }

        .placeholder-icon {
            font-size: 5rem;
            opacity: 0.5;
        }

        /* 悬浮窗 - 可点击切换 */
        .pip-view {
            position: absolute;
            width: 140px;
            height: 186px;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            z-index: 10;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 3px solid rgba(255,255,255,0.4);
            cursor: pointer;
            user-select: none;
            touch-action: none;
            right: 20px;
            top: 60px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .pip-view:active {
            transform: scale(0.95);
            border-color: #00cec9;
        }

        .pip-view.dragging {
            opacity: 0.8;
            transition: none;
            border-color: #00cec9;
        }

        #pip-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            pointer-events: none;
        }

        .pip-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        .pip-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 11px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            font-weight: 600;
        }

        .pip-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 12px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 切换提示 */
        .swap-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 18px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(20px);
        }

        .swap-hint.show {
            opacity: 1;
        }

        /* 状态提示 - 自动隐藏 */
        .status-toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0,0,0,0.85);
            border-radius: 25px;
            font-size: 14px;
            z-index: 50;
            backdrop-filter: blur(20px);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 80%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-toast.show {
            opacity: 1;
        }

        .status-toast.success { background: rgba(46, 204, 113, 0.9); color: #fff; }
        .status-toast.error { background: rgba(231, 76, 60, 0.9); }
        .status-toast.warning { background: rgba(241, 196, 15, 0.9); color: #000; }

        /* 控制面板 - 可折叠 */
        .controls-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.8) 60%, transparent 100%);
            z-index: 20;
            transition: transform 0.3s ease;
            padding: 20px 20px 40px;
            /* 适配底部安全区域 */
            padding-bottom: max(40px, env(safe-area-inset-bottom));
        }

        .controls-panel.hidden {
            transform: translateY(calc(100% - 60px));
        }

        .panel-trigger {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            width: 60px;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .panel-trigger:active {
            background: rgba(255,255,255,0.6);
            width: 80px;
        }

        .controls-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 1;
            transition: opacity 0.2s;
        }

        .controls-panel.hidden .controls-content {
            opacity: 0;
            pointer-events: none;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .control-group label {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
        }

        select {
            background: rgba(0,0,0,0.4);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
            min-width: 100px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
            justify-content: center;
            font-size: 20px;
        }

        .btn-primary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: rgba(255,255,255,0.3);
        }

        .btn-active {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border-color: transparent;
        }

        .btn-capture {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            padding: 0;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-capture:active:not(:disabled) {
            transform: scale(0.9);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 悬浮按钮 */
        .floating-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            z-index: 19;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .floating-btn.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* 截图预览 */
        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .preview-img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .preview-actions {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .preview-btn {
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-save {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }

        .btn-close {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        canvas {
            display: none;
        }

        /* 加载动画 */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60;
            display: none;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00cec9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 顶部栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            padding-top: max(15px, env(safe-area-inset-top));
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 15;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .app-title {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.9;
        }

        .battery-indicator {
            font-size: 12px;
            opacity: 0.7;
        }

        /* 安装提示 */
        .install-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            display: none;
            max-width: 80%;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .install-hint.show {
            display: block;
        }

        .install-hint h3 {
            margin-bottom: 15px;
            color: #00cec9;
        }

        .install-hint p {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }

        .install-hint .close {
            margin-top: 20px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 全屏hack元素 -->
    <div class="fullscreen-hack" id="fullscreenHack"></div>

    <div id="app">
        <!-- 主视频（全屏） -->
        <div class="main-view" id="mainView">
            <div class="placeholder" id="mainPlaceholder">
                <div class="placeholder-icon">📷</div>
                <div class="placeholder-text">点击右下角按钮开启</div>
            </div>
            <video id="mainVideo" autoplay playsinline muted></video>
        </div>

        <!-- 悬浮窗视频 -->
        <div class="pip-view" id="pipView">
            <div class="pip-badge" id="pipBadge">前置</div>
            <div class="pip-placeholder" id="pipPlaceholder">🤳</div>
            <video id="pipVideo" autoplay playsinline muted></video>
            <div class="pip-hint">👆 点击切换</div>
        </div>

        <!-- 切换提示 -->
        <div class="swap-hint" id="swapHint">🔄 已切换</div>

        <!-- 状态提示 -->
        <div class="status-toast" id="statusToast">准备就绪</div>

        <!-- 加载动画 -->
        <div class="loader" id="loader">
            <div class="loader-spinner"></div>
        </div>

        <!-- 悬浮按钮 -->
        <button class="floating-btn" id="floatingBtn" onclick="togglePanel()">⚙️</button>

        <!-- 控制面板 -->
        <div class="controls-panel hidden" id="controlsPanel">
            <div class="panel-trigger" onclick="togglePanel()"></div>
            
            <div class="controls-content">
                <div class="control-row">
                    <div class="control-group">
                        <label>全屏:</label>
                        <select id="mainSelect" onchange="onPositionChange()">
                            <option value="back">后置摄像头</option>
                            <option value="front">前置摄像头</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>小窗:</label>
                        <select id="pipSelect" onchange="onPositionChange()">
                            <option value="front" selected>前置摄像头</option>
                            <option value="back">后置摄像头</option>
                        </select>
                    </div>
                </div>

                <div class="control-row">
                    <button class="btn-primary" id="startBtn" onclick="startCameras()">
                        ▶️ 开启
                    </button>
                    <button class="btn-primary btn-icon" id="swapBtn" onclick="swapCameras()" disabled>
                        🔄
                    </button>
                    <button class="btn-capture" id="captureBtn" onclick="capture()" disabled>
                        ●
                    </button>
                    <button class="btn-primary btn-icon" id="pipToggleBtn" onclick="togglePipVisibility()" disabled>
                        👁️
                    </button>
                    <button class="btn-primary btn-icon" id="stopBtn" onclick="stopCameras()" disabled>
                        ⏹
                    </button>
                </div>
            </div>
        </div>

        <!-- 截图预览 -->
        <div class="preview-overlay" id="previewOverlay">
            <img class="preview-img" id="previewImg" alt="截图">
            <div class="preview-actions">
                <button class="preview-btn btn-save" onclick="savePhoto()">💾 保存</button>
                <button class="preview-btn btn-close" onclick="closePreview()">✕ 关闭</button>
            </div>
        </div>

        <!-- 安装提示 -->
        <div class="install-hint" id="installHint">
            <h3>📱 添加到主屏幕</h3>
            <p>为获得最佳全屏体验，建议将本网页添加到主屏幕</p>
            <p id="installSteps">iOS: 分享 → 添加到主屏幕<br>Android: 菜单 → 添加到主屏幕</p>
            <button class="close" onclick="hideInstallHint()">我知道了</button>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script>
        // DOM 元素
        const mainVideo = document.getElementById('mainVideo');
        const pipVideo = document.getElementById('pipVideo');
        const mainPlaceholder = document.getElementById('mainPlaceholder');
        const pipPlaceholder = document.getElementById('pipPlaceholder');
        const pipView = document.getElementById('pipView');
        const pipBadge = document.getElementById('pipBadge');
        const statusToast = document.getElementById('statusToast');
        const controlsPanel = document.getElementById('controlsPanel');
        const floatingBtn = document.getElementById('floatingBtn');
        const swapHint = document.getElementById('swapHint');
        const mainSelect = document.getElementById('mainSelect');
        const pipSelect = document.getElementById('pipSelect');
        const loader = document.getElementById('loader');
        const installHint = document.getElementById('installHint');

        let mainStream = null;
        let pipStream = null;
        let isRunning = false;
        let isPipVisible = true;
        let statusTimer = null;

        // 初始化 - 模拟全屏
        window.onload = () => {
            // 1. 立即尝试模拟全屏（滚动隐藏地址栏）
            simulateFullscreen();
            
            // 2. 延迟再次尝试（确保页面完全渲染）
            setTimeout(simulateFullscreen, 100);
            setTimeout(simulateFullscreen, 500);
            
            // 3. 检查是否是 PWA 模式
            checkPWAMode();
            
            // 4. 显示初始提示
            setTimeout(() => {
                showStatus('👆 点击悬浮窗可切换全屏/小窗', 'success');
            }, 800);
        };

        // 模拟全屏方法（无需用户交互）
        function simulateFullscreen() {
            // 方法1: 滚动隐藏地址栏
            window.scrollTo(0, 1);
            
            // 方法2: 尝试进入全屏（某些浏览器可能允许）
            const doc = document.documentElement;
            if (doc.requestFullscreen && !document.fullscreenElement) {
                doc.requestFullscreen().catch(() => {
                    // 失败静默处理
                });
            }
            
            // 方法3: 对于 iOS Safari，使用特殊滚动
            if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                setTimeout(() => {
                    window.scrollTo(0, 100);
                    setTimeout(() => window.scrollTo(0, 0), 50);
                }, 50);
            }
            
            // 方法4: 强制重绘，确保占满屏幕
            document.body.style.height = window.innerHeight + 'px';
            setTimeout(() => {
                document.body.style.height = '100%';
            }, 100);
        }

        // 检查 PWA 模式
        function checkPWAMode() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                || window.navigator.standalone === true;
            
            if (isStandalone) {
                // 已经是 PWA 模式，真正的全屏
                showStatus('✅ 已以全屏APP模式运行', 'success');
            } else {
                // 显示安装提示（延迟，避免打扰）
                setTimeout(() => {
                    if (!localStorage.getItem('installHintDismissed')) {
                        installHint.classList.add('show');
                    }
                }, 3000);
            }
        }

        function hideInstallHint() {
            installHint.classList.remove('show');
            localStorage.setItem('installHintDismissed', 'true');
        }

        // 监听屏幕方向变化，重新调整
        window.addEventListener('orientationchange', () => {
            setTimeout(simulateFullscreen, 300);
        });

        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            // 确保始终占满屏幕
            document.getElementById('app').style.height = window.innerHeight + 'px';
        });

        // 状态提示
        function showStatus(message, type = '') {
            clearTimeout(statusTimer);
            statusToast.textContent = message;
            statusToast.className = 'status-toast show ' + type;
            
            statusTimer = setTimeout(() => {
                statusToast.classList.remove('show');
            }, 2000);
        }

        // 控制面板折叠
        function togglePanel() {
            controlsPanel.classList.toggle('hidden');
            floatingBtn.classList.toggle('show');
        }

        // 拖动悬浮窗
        let isDragging = false;
        let dragStartX, dragStartY, dragInitialX, dragInitialY;

        pipView.addEventListener('mousedown', startDrag);
        pipView.addEventListener('touchstart', startDrag, { passive: false });

        function startDrag(e) {
            if (!isRunning) return;
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            dragStartX = clientX;
            dragStartY = clientY;
            
            const rect = pipView.getBoundingClientRect();
            dragInitialX = rect.left;
            dragInitialY = rect.top;
            
            isDragging = false;
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('touchmove', onDrag, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function onDrag(e) {
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            const dx = Math.abs(clientX - dragStartX);
            const dy = Math.abs(clientY - dragStartY);
            
            if (dx > 5 || dy > 5) {
                isDragging = true;
                pipView.classList.add('dragging');
            }
            
            if (isDragging) {
                e.preventDefault();
                const x = dragInitialX + (clientX - dragStartX);
                const y = dragInitialY + (clientY - dragStartY);
                
                const maxX = window.innerWidth - pipView.offsetWidth;
                const maxY = window.innerHeight - pipView.offsetHeight;
                
                pipView.style.left = Math.max(0, Math.min(x, maxX)) + 'px';
                pipView.style.top = Math.max(0, Math.min(y, maxY)) + 'px';
                pipView.style.right = 'auto';
            }
        }

        function endDrag() {
            pipView.classList.remove('dragging');
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('touchmove', onDrag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);
            
            setTimeout(() => {
                isDragging = false;
            }, 10);
        }

        // 点击悬浮窗切换
        pipView.addEventListener('click', (e) => {
            if (isDragging || !isRunning) return;
            e.stopPropagation();
            switchVideos();
        });

        // 切换视频位置
        function switchVideos() {
            const temp = mainSelect.value;
            mainSelect.value = pipSelect.value;
            pipSelect.value = temp;
            
            swapCameras(true);
        }

        function onPositionChange() {
            if (isRunning) {
                showStatus('设置已更改，点击交换按钮应用', 'warning');
            }
        }

        // 启动摄像头
        async function startCameras() {
            document.getElementById('startBtn').disabled = true;
            loader.style.display = 'block';
            showStatus('正在启动摄像头...');

            try {
                const mainFacing = mainSelect.value === 'back' ? 'environment' : 'user';
                const pipFacing = pipSelect.value === 'back' ? 'environment' : 'user';

                // 启动主摄像头
                mainStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { exact: mainFacing },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });

                mainVideo.srcObject = mainStream;
                mainPlaceholder.style.display = 'none';
                mainVideo.style.display = 'block';
                mainVideo.style.transform = mainFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

                // 尝试启动悬浮窗
                if (mainSelect.value !== pipSelect.value) {
                    try {
                        pipStream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                facingMode: { exact: pipFacing },
                                width: { ideal: 640 }
                            },
                            audio: false
                        });

                        pipVideo.srcObject = pipStream;
                        pipPlaceholder.style.display = 'none';
                        pipVideo.style.display = 'block';
                        pipVideo.style.transform = pipFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                        pipBadge.textContent = pipSelect.value === 'back' ? '后置' : '前置';
                        
                    } catch (err) {
                        console.log('双摄像头失败:', err);
                        pipPlaceholder.innerHTML = '<div style="font-size:1.2rem">❌</div><div style="font-size:10px">不支持</div>';
                        showStatus('设备不支持同时开启两个摄像头', 'warning');
                    }
                } else {
                    pipPlaceholder.innerHTML = '<div style="font-size:1.2rem">⚠️</div><div style="font-size:10px">相同</div>';
                }

                isRunning = true;
                loader.style.display = 'none';

                document.getElementById('stopBtn').disabled = false;
                document.getElementById('captureBtn').disabled = false;
                document.getElementById('swapBtn').disabled = false;
                document.getElementById('pipToggleBtn').disabled = false;

                showStatus('摄像头已启动，点击悬浮窗可切换', 'success');
                
                // 自动收起面板
                setTimeout(() => {
                    controlsPanel.classList.add('hidden');
                    floatingBtn.classList.add('show');
                }, 1500);

            } catch (err) {
                loader.style.display = 'none';
                showStatus('启动失败: ' + err.message, 'error');
                document.getElementById('startBtn').disabled = false;
            }
        }

        // 交换摄像头
        async function swapCameras(isQuickSwitch = false) {
            if (!isRunning) return;

            loader.style.display = 'block';
            if (!isQuickSwitch) showStatus('正在交换...');

            try {
                if (mainStream) {
                    mainStream.getTracks().forEach(t => t.stop());
                    mainStream = null;
                }
                if (pipStream) {
                    pipStream.getTracks().forEach(t => t.stop());
                    pipStream = null;
                }

                const mainFacing = mainSelect.value === 'back' ? 'environment' : 'user';
                const pipFacing = pipSelect.value === 'back' ? 'environment' : 'user';

                mainStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { exact: mainFacing },
                        width: { ideal: 1920 }
                    },
                    audio: false
                });

                mainVideo.srcObject = mainStream;
                mainVideo.style.transform = mainFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

                if (mainSelect.value !== pipSelect.value) {
                    try {
                        pipStream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                facingMode: { exact: pipFacing },
                                width: { ideal: 640 }
                            },
                            audio: false
                        });

                        pipVideo.srcObject = pipStream;
                        pipVideo.style.transform = pipFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                        pipPlaceholder.style.display = 'none';
                        pipVideo.style.display = 'block';
                        pipBadge.textContent = pipSelect.value === 'back' ? '后置' : '前置';
                        
                    } catch (err) {
                        pipPlaceholder.innerHTML = '<div style="font-size:1.2rem">❌</div><div style="font-size:10px">不支持</div>';
                        pipVideo.style.display = 'none';
                    }
                } else {
                    pipPlaceholder.innerHTML = '<div style="font-size:1.2rem">⚠️</div><div style="font-size:10px">相同</div>';
                    pipVideo.style.display = 'none';
                }

                loader.style.display = 'none';
                
                swapHint.classList.add('show');
                setTimeout(() => swapHint.classList.remove('show'), 800);
                
                if (!isQuickSwitch) {
                    showStatus('交换完成', 'success');
                }

            } catch (err) {
                loader.style.display = 'none';
                showStatus('交换失败: ' + err.message, 'error');
            }
        }

        // 切换悬浮窗显示
        function togglePipVisibility() {
            if (!isRunning) return;
            
            isPipVisible = !isPipVisible;
            pipView.style.display = isPipVisible ? 'block' : 'none';
            
            const btn = document.getElementById('pipToggleBtn');
            btn.innerHTML = isPipVisible ? '👁️' : '🙈';
            
            showStatus(isPipVisible ? '悬浮窗已显示' : '悬浮窗已隐藏');
        }

        // 拍照
        function capture() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = mainVideo.videoWidth;
            canvas.height = mainVideo.videoHeight;
            
            ctx.save();
            if (mainVideo.style.transform === 'scaleX(-1)') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(mainVideo, 0, 0);
            ctx.restore();
            
            if (isPipVisible && pipStream && pipVideo.style.display !== 'none') {
                const pipRect = pipView.getBoundingClientRect();
                const mainRect = mainVideo.getBoundingClientRect();
                
                const relX = (pipRect.left - mainRect.left) / mainRect.width * canvas.width;
                const relY = (pipRect.top - mainRect.top) / mainRect.height * canvas.height;
                const relW = pipRect.width / mainRect.width * canvas.width;
                const relH = pipRect.height / mainRect.height * canvas.height;
                
                ctx.save();
                if (pipVideo.style.transform === 'scaleX(-1)') {
                    ctx.translate(relX + relW, relY);
                    ctx.scale(-1, 1);
                    ctx.drawImage(pipVideo, 0, 0, relW, relH);
                } else {
                    ctx.drawImage(pipVideo, relX, relY, relW, relH);
                }
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.strokeRect(relX, relY, relW, relH);
                ctx.restore();
            }
            
            const previewImg = document.getElementById('previewImg');
            previewImg.src = canvas.toDataURL('image/png');
            document.getElementById('previewOverlay').style.display = 'flex';
        }

        function savePhoto() {
            const canvas = document.getElementById('canvas');
            const link = document.createElement('a');
            link.download = `DualCam_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showStatus('照片已保存', 'success');
        }

        function closePreview() {
            document.getElementById('previewOverlay').style.display = 'none';
        }

        // 停止摄像头
        function stopCameras() {
            if (mainStream) {
                mainStream.getTracks().forEach(t => t.stop());
                mainStream = null;
            }
            if (pipStream) {
                pipStream.getTracks().forEach(t => t.stop());
                pipStream = null;
            }

            mainVideo.style.display = 'none';
            pipVideo.style.display = 'none';
            mainPlaceholder.style.display = 'flex';
            pipPlaceholder.style.display = 'flex';
            pipPlaceholder.innerHTML = '🤳';
            
            pipView.style.left = 'auto';
            pipView.style.top = '60px';
            pipView.style.right = '20px';
            
            isRunning = false;
            isPipVisible = true;
            pipView.style.display = 'block';

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('captureBtn').disabled = true;
            document.getElementById('swapBtn').disabled = true;
            document.getElementById('pipToggleBtn').disabled = true;
            document.getElementById('pipToggleBtn').innerHTML = '👁️';

            showStatus('摄像头已停止');
        }

        // 清理
        window.addEventListener('beforeunload', stopCameras);
        
        // 防止空格键滚动
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') e.preventDefault();
        });

        // 持续尝试保持全屏状态
        setInterval(() => {
            if (window.scrollY > 0) {
                window.scrollTo(0, 0);
            }
        }, 1000);
    </script>
</body>
</html>
