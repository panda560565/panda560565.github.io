<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>可拖动画中画双摄像头</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }

        /* 全屏视频容器 */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        #fullscreen-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            gap: 20px;
        }

        .placeholder-icon {
            font-size: 5rem;
            opacity: 0.5;
        }

        /* 可拖动悬浮窗 */
        .draggable-pip {
            position: fixed;
            width: 140px;
            height: 186px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            cursor: grab;
            user-select: none;
            touch-action: none;
            right: 20px;
            bottom: 140px;
        }

        .draggable-pip:active {
            cursor: grabbing;
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.6);
        }

        .draggable-pip.dragging {
            opacity: 0.8;
            transition: none;
        }

        #pip-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            pointer-events: none;
        }

        .pip-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        .pip-label {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 11px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 5;
        }

        .drag-hint {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 10px;
            pointer-events: none;
        }

        /* 控制栏 */
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .btn-primary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .btn-active {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border-color: transparent;
        }

        .btn-swap {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-capture {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            padding: 0;
            justify-content: center;
            font-size: 22px;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 状态提示 */
        .status {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0,0,0,0.8);
            border-radius: 25px;
            font-size: 13px;
            z-index: 30;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 85%;
            transition: all 0.3s;
        }

        .status.error { background: rgba(231, 76, 60, 0.9); }
        .status.success { background: rgba(46, 204, 113, 0.9); }
        .status.warning { background: rgba(241, 196, 15, 0.9); color: #000; }

        /* 位置选择器 */
        .position-selector {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .position-selector label {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }

        select {
            background: rgba(0,0,0,0.3);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            outline: none;
        }

        /* 截图预览 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .snapshot-container {
            position: relative;
            max-width: 90%;
            max-height: 80%;
        }

        .snapshot-img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .snapshot-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        canvas {
            display: none;
        }

        /* 加载动画 */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 40;
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00cec9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 全屏视频 -->
    <div class="fullscreen-container">
        <div class="placeholder" id="fullscreen-placeholder">
            <span class="placeholder-icon">📷</span>
            <span>点击开启摄像头</span>
        </div>
        <video id="fullscreen-video" autoplay playsinline muted></video>
    </div>

    <!-- 可拖动悬浮窗 -->
    <div class="draggable-pip" id="pip-container">
        <div class="pip-label" id="pip-label">前置</div>
        <div class="pip-placeholder" id="pip-placeholder">🤳</div>
        <video id="pip-video" autoplay playsinline muted></video>
        <div class="drag-hint">👆 拖动</div>
    </div>

    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- 状态提示 -->
    <div class="status" id="status">准备就绪 - 请选择摄像头位置</div>

    <!-- 控制栏 -->
    <div class="controls">
        <div class="control-row">
            <div class="position-selector">
                <label>全屏显示:</label>
                <select id="fullscreen-select">
                    <option value="back">后置摄像头</option>
                    <option value="front">前置摄像头</option>
                </select>
            </div>
            <div class="position-selector">
                <label>悬浮窗:</label>
                <select id="pip-select">
                    <option value="front" selected>前置摄像头</option>
                    <option value="back">后置摄像头</option>
                </select>
            </div>
        </div>
        
        <div class="control-row">
            <button class="btn-primary" id="startBtn" onclick="startCameras()">
                ▶️ 开启
            </button>
            <button class="btn-swap" id="swapBtn" onclick="swapCameras()" disabled>
                🔄 交换位置
            </button>
            <button class="btn-capture" id="captureBtn" onclick="capture()" disabled>
                📸
            </button>
            <button class="btn-primary" id="hidePipBtn" onclick="togglePip()" disabled>
                🙈 隐藏悬浮窗
            </button>
            <button class="btn-primary" id="stopBtn" onclick="stopCameras()" disabled>
                ⏹️ 停止
            </button>
        </div>
    </div>

    <!-- 截图预览 -->
    <div class="overlay" id="overlay">
        <div class="snapshot-container">
            <img class="snapshot-img" id="snapshot-img" alt="截图">
            <div class="snapshot-actions">
                <button class="btn-primary" onclick="downloadSnapshot()">⬇️ 保存到相册</button>
                <button class="btn-primary" onclick="closeSnapshot()">❌ 关闭</button>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const fullscreenVideo = document.getElementById('fullscreen-video');
        const pipVideo = document.getElementById('pip-video');
        const fullscreenPlaceholder = document.getElementById('fullscreen-placeholder');
        const pipPlaceholder = document.getElementById('pip-placeholder');
        const pipContainer = document.getElementById('pip-container');
        const pipLabel = document.getElementById('pip-label');
        const status = document.getElementById('status');
        const fullscreenSelect = document.getElementById('fullscreen-select');
        const pipSelect = document.getElementById('pip-select');
        const loading = document.getElementById('loading');

        let fullscreenStream = null;
        let pipStream = null;
        let isRunning = false;
        let isPipVisible = true;

        // 拖动功能
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        pipContainer.addEventListener('mousedown', startDrag);
        pipContainer.addEventListener('touchstart', startDrag, { passive: false });

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });

        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);

        function startDrag(e) {
            if (!isRunning) return;
            isDragging = true;
            pipContainer.classList.add('dragging');
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            startX = clientX;
            startY = clientY;
            
            const rect = pipContainer.getBoundingClientRect();
            initialLeft = rect.left;
            initialTop = rect.top;
            
            e.preventDefault();
        }

        function drag(e) {
            if (!isDragging) return;
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            const dx = clientX - startX;
            const dy = clientY - startY;
            
            let newLeft = initialLeft + dx;
            let newTop = initialTop + dy;
            
            // 边界限制
            const maxLeft = window.innerWidth - pipContainer.offsetWidth;
            const maxTop = window.innerHeight - pipContainer.offsetHeight;
            
            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));
            
            pipContainer.style.left = newLeft + 'px';
            pipContainer.style.top = newTop + 'px';
            pipContainer.style.right = 'auto';
            pipContainer.style.bottom = 'auto';
            
            e.preventDefault();
        }

        function stopDrag() {
            isDragging = false;
            pipContainer.classList.remove('dragging');
        }

        // 监听选择器变化
        fullscreenSelect.addEventListener('change', () => {
            if (isRunning) {
                status.textContent = '设置已更改，点击交换或重新开启生效';
                status.className = 'status warning';
            }
        });

        pipSelect.addEventListener('change', () => {
            if (isRunning) {
                status.textContent = '设置已更改，点击交换或重新开启生效';
                status.className = 'status warning';
            }
        });

        async function startCameras() {
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            loading.style.display = 'block';
            status.textContent = '⏳ 正在启动摄像头...';
            status.className = 'status';

            try {
                const fullscreenFacing = fullscreenSelect.value === 'back' ? 'environment' : 'user';
                const pipFacing = pipSelect.value === 'back' ? 'environment' : 'user';

                // 先开启全屏摄像头
                fullscreenStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { exact: fullscreenFacing },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });

                fullscreenVideo.srcObject = fullscreenStream;
                fullscreenPlaceholder.style.display = 'none';
                fullscreenVideo.style.display = 'block';

                // 设置镜像（前置摄像头需要镜像）
                fullscreenVideo.style.transform = fullscreenFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

                // 尝试开启悬浮窗摄像头（如果与全屏不同）
                if (fullscreenSelect.value !== pipSelect.value) {
                    try {
                        // 先停止再重新获取，避免冲突
                        pipStream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                facingMode: { exact: pipFacing },
                                width: { ideal: 640 },
                                height: { ideal: 480 }
                            },
                            audio: false
                        });

                        pipVideo.srcObject = pipStream;
                        pipPlaceholder.style.display = 'none';
                        pipVideo.style.display = 'block';
                        pipVideo.style.transform = pipFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                        
                        pipLabel.textContent = pipSelect.value === 'back' ? '后置' : '前置';
                        
                    } catch (err) {
                        console.log('双摄像头失败:', err);
                        status.innerHTML = '⚠️ 设备不支持同时开启两个摄像头<br><small>仅开启了全屏摄像头</small>';
                        status.className = 'status warning';
                        
                        // 禁用悬浮窗相关功能
                        pipPlaceholder.innerHTML = '<span style="font-size:1.5rem">❌</span><div style="font-size:10px">不可用</div>';
                    }
                } else {
                    // 两个选择相同，只开一个
                    pipPlaceholder.innerHTML = '<span style="font-size:1.5rem">⚠️</span><div style="font-size:10px">相同</div>';
                    status.textContent = '两个位置选择了相同摄像头，仅开启一个';
                    status.className = 'status warning';
                }

                isRunning = true;
                loading.style.display = 'none';
                
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('captureBtn').disabled = false;
                document.getElementById('swapBtn').disabled = false;
                document.getElementById('hidePipBtn').disabled = false;

                if (status.className === 'status') {
                    status.innerHTML = `✅ 已开启<br><small>全屏: ${fullscreenSelect.options[fullscreenSelect.selectedIndex].text} | 悬浮窗: ${pipSelect.options[pipSelect.selectedIndex].text}</small>`;
                    status.className = 'status success';
                }

            } catch (err) {
                loading.style.display = 'none';
                status.innerHTML = '❌ 错误: ' + err.message + '<br><small>请确保已授予摄像头权限</small>';
                status.className = 'status error';
                startBtn.disabled = false;
                console.error('启动失败:', err);
            }
        }

        async function swapCameras() {
            if (!isRunning) return;

            loading.style.display = 'block';
            status.textContent = '⏳ 正在交换摄像头...';
            status.className = 'status';

            try {
                // 获取当前设置
                const currentFullscreen = fullscreenSelect.value;
                const currentPip = pipSelect.value;

                // 交换选择器值
                fullscreenSelect.value = currentPip;
                pipSelect.value = currentFullscreen;

                // 停止所有摄像头
                if (fullscreenStream) {
                    fullscreenStream.getTracks().forEach(track => track.stop());
                    fullscreenStream = null;
                }
                if (pipStream) {
                    pipStream.getTracks().forEach(track => track.stop());
                    pipStream = null;
                }

                // 重新启动
                const newFullscreenFacing = fullscreenSelect.value === 'back' ? 'environment' : 'user';
                const newPipFacing = pipSelect.value === 'back' ? 'environment' : 'user';

                // 开启新的全屏摄像头
                fullscreenStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { exact: newFullscreenFacing },
                        width: { ideal: 1920 }
                    },
                    audio: false
                });

                fullscreenVideo.srcObject = fullscreenStream;
                fullscreenVideo.style.transform = newFullscreenFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

                // 尝试开启新的悬浮窗摄像头（如果不同）
                if (fullscreenSelect.value !== pipSelect.value) {
                    try {
                        pipStream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                facingMode: { exact: newPipFacing },
                                width: { ideal: 640 }
                            },
                            audio: false
                        });

                        pipVideo.srcObject = pipStream;
                        pipVideo.style.transform = newPipFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                        pipPlaceholder.style.display = 'none';
                        pipVideo.style.display = 'block';
                        
                        pipLabel.textContent = pipSelect.value === 'back' ? '后置' : '前置';
                        
                    } catch (err) {
                        pipPlaceholder.innerHTML = '<span style="font-size:1.5rem">❌</span><div style="font-size:10px">不可用</div>';
                        pipVideo.style.display = 'none';
                    }
                } else {
                    pipPlaceholder.innerHTML = '<span style="font-size:1.5rem">⚠️</span><div style="font-size:10px">相同</div>';
                    pipVideo.style.display = 'none';
                }

                loading.style.display = 'none';
                status.innerHTML = `✅ 已交换<br><small>全屏: ${fullscreenSelect.options[fullscreenSelect.selectedIndex].text} | 悬浮窗: ${pipSelect.options[pipSelect.selectedIndex].text}</small>`;
                status.className = 'status success';

            } catch (err) {
                loading.style.display = 'none';
                status.textContent = '交换失败: ' + err.message;
                status.className = 'status error';
                console.error('交换失败:', err);
            }
        }

        function togglePip() {
            if (!isRunning) return;
            
            isPipVisible = !isPipVisible;
            pipContainer.style.display = isPipVisible ? 'block' : 'none';
            
            const btn = document.getElementById('hidePipBtn');
            btn.textContent = isPipVisible ? '🙈 隐藏悬浮窗' : '👁️ 显示悬浮窗';
        }

        function capture() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = fullscreenVideo.videoWidth;
            canvas.height = fullscreenVideo.videoHeight;
            
            // 绘制全屏视频（考虑镜像）
            ctx.save();
            if (fullscreenVideo.style.transform === 'scaleX(-1)') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(fullscreenVideo, 0, 0);
            ctx.restore();
            
            // 如果悬浮窗可见且有视频，绘制到角落
            if (isPipVisible && pipStream && pipVideo.style.display !== 'none') {
                const pipRect = pipContainer.getBoundingClientRect();
                const fullRect = fullscreenVideo.getBoundingClientRect();
                
                // 计算悬浮窗在全屏视频中的相对位置
                const relativeX = (pipRect.left - fullRect.left) / fullRect.width * canvas.width;
                const relativeY = (pipRect.top - fullRect.top) / fullRect.height * canvas.height;
                const relativeW = pipRect.width / fullRect.width * canvas.width;
                const relativeH = pipRect.height / fullRect.height * canvas.height;
                
                ctx.save();
                if (pipVideo.style.transform === 'scaleX(-1)') {
                    ctx.translate(relativeX + relativeW, relativeY);
                    ctx.scale(-1, 1);
                    ctx.drawImage(pipVideo, 0, 0, relativeW, relativeH);
                } else {
                    ctx.drawImage(pipVideo, relativeX, relativeY, relativeW, relativeH);
                }
                ctx.restore();
                
                // 绘制边框
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 3;
                ctx.strokeRect(relativeX, relativeY, relativeW, relativeH);
            }
            
            // 显示预览
            const snapshotImg = document.getElementById('snapshot-img');
            snapshotImg.src = canvas.toDataURL('image/png');
            document.getElementById('overlay').style.display = 'flex';
        }

        function downloadSnapshot() {
            const canvas = document.getElementById('canvas');
            const link = document.createElement('a');
            link.download = `双摄像头_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function closeSnapshot() {
            document.getElementById('overlay').style.display = 'none';
        }

        function stopCameras() {
            if (fullscreenStream) {
                fullscreenStream.getTracks().forEach(track => track.stop());
                fullscreenStream = null;
            }
            if (pipStream) {
                pipStream.getTracks().forEach(track => track.stop());
                pipStream = null;
            }

            fullscreenVideo.style.display = 'none';
            pipVideo.style.display = 'none';
            fullscreenPlaceholder.style.display = 'flex';
            pipPlaceholder.style.display = 'flex';
            pipPlaceholder.innerHTML = '🤳';
            
            // 重置悬浮窗位置
            pipContainer.style.left = 'auto';
            pipContainer.style.top = 'auto';
            pipContainer.style.right = '20px';
            pipContainer.style.bottom = '140px';
            
            isRunning = false;
            isPipVisible = true;
            pipContainer.style.display = 'block';

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('captureBtn').disabled = true;
            document.getElementById('swapBtn').disabled = true;
            document.getElementById('hidePipBtn').disabled = true;
            document.getElementById('hidePipBtn').textContent = '🙈 隐藏悬浮窗';
            pipLabel.textContent = '前置';

            status.textContent = '摄像头已停止';
            status.className = 'status';
        }

        // 清理
        window.addEventListener('beforeunload', stopCameras);
    </script>
</body>
</html>
