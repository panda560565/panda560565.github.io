<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>双摄像头同时预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-align: center;
        }

        .cameras-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 768px) {
            .cameras-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .camera-box {
            position: relative;
            background: #0f0f1e;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/3;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .camera-label {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            gap: 10px;
        }

        .placeholder-icon {
            font-size: 3rem;
        }

        .placeholder-text {
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 14px 32px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-start {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,184,148,0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #fd79a8 0%, #fdcb6e 100%);
            color: white;
        }

        .btn-swap {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            font-size: 14px;
            text-align: center;
            max-width: 600px;
        }

        .error {
            background: rgba(231, 76, 60, 0.2);
            color: #ff6b6b;
        }

        .success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .warning {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .info-panel {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            max-width: 600px;
            line-height: 1.6;
        }

        .info-panel strong {
            color: #fff;
        }

        #front-video {
            transform: scaleX(-1); /* 前置摄像头镜像 */
        }
    </style>
</head>
<body>
    <h1>📱 前后摄像头同时预览</h1>
    
    <div class="cameras-wrapper">
        <!-- 后置摄像头 -->
        <div class="camera-box">
            <div class="camera-label">📷 后置摄像头</div>
            <div class="placeholder" id="back-placeholder">
                <span class="placeholder-icon">🎥</span>
                <span class="placeholder-text">等待开启</span>
            </div>
            <video id="back-video" autoplay playsinline muted></video>
        </div>

        <!-- 前置摄像头 -->
        <div class="camera-box">
            <div class="camera-label">🤳 前置摄像头</div>
            <div class="placeholder" id="front-placeholder">
                <span class="placeholder-icon">👤</span>
                <span class="placeholder-text">等待开启</span>
            </div>
            <video id="front-video" autoplay playsinline muted></video>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" id="startBtn" onclick="startBothCameras()">
            ▶️ 开启双摄像头
        </button>
        <button class="btn-stop" id="stopBtn" onclick="stopCameras()" disabled>
            ⏹️ 关闭
        </button>
        <button class="btn-swap" id="swapBtn" onclick="swapPositions()" disabled>
            🔄 交换位置
        </button>
    </div>

    <div class="status" id="status">点击"开启双摄像头"开始使用</div>

    <div class="info-panel">
        <strong>💡 提示：</strong><br>
        • 需要手机/平板设备且具备前后双摄像头<br>
        • 部分浏览器可能不支持同时调用两个摄像头<br>
        • 如果无法同时开启，会尝试单独开启可用摄像头<br>
        • 建议在 Chrome 或 Safari 浏览器中使用
    </div>

    <script>
        const backVideo = document.getElementById('back-video');
        const frontVideo = document.getElementById('front-video');
        const backPlaceholder = document.getElementById('back-placeholder');
        const frontPlaceholder = document.getElementById('front-placeholder');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const swapBtn = document.getElementById('swapBtn');

        let backStream = null;
        let frontStream = null;
        let isSwapped = false;

        async function startBothCameras() {
            startBtn.disabled = true;
            status.textContent = '⏳ 正在请求摄像头权限...';
            status.className = 'status';

            try {
                // 尝试同时获取两个摄像头
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                console.log('可用摄像头:', videoDevices.map(d => d.label || '未命名'));

                if (videoDevices.length < 2) {
                    status.innerHTML = '⚠️ 设备只有一个摄像头，尝试开启可用摄像头...';
                    status.className = 'status warning';
                }

                // 尝试开启后置摄像头
                try {
                    backStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: { exact: 'environment' },
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    });
                    backVideo.srcObject = backStream;
                    backPlaceholder.style.display = 'none';
                    backVideo.style.display = 'block';
                } catch (err) {
                    console.log('后置摄像头失败:', err.message);
                    // 尝试任何可用摄像头作为后置
                    backStream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1280 } },
                        audio: false
                    });
                    backVideo.srcObject = backStream;
                    backPlaceholder.style.display = 'none';
                    backVideo.style.display = 'block';
                }

                // 尝试开启前置摄像头（使用不同的设备ID）
                try {
                    // 获取当前使用的设备ID，避免冲突
                    const usedTrack = backStream.getVideoTracks()[0];
                    const usedDeviceId = usedTrack.getSettings().deviceId;
                    
                    // 找另一个设备
                    const otherDevice = videoDevices.find(d => d.deviceId !== usedDeviceId);
                    
                    if (otherDevice) {
                        frontStream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                deviceId: { exact: otherDevice.deviceId },
                                width: { ideal: 1280 },
                                height: { ideal: 720 }
                            },
                            audio: false
                        });
                    } else {
                        // 如果没有其他设备，尝试用 facingMode
                        frontStream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                facingMode: { exact: 'user' },
                                width: { ideal: 1280 }
                            },
                            audio: false
                        });
                    }
                    
                    frontVideo.srcObject = frontStream;
                    frontPlaceholder.style.display = 'none';
                    frontVideo.style.display = 'block';
                } catch (err) {
                    console.log('前置摄像头失败:', err.message);
                    frontPlaceholder.innerHTML = '<span class="placeholder-icon">❌</span><span class="placeholder-text">前置摄像头不可用</span>';
                }

                stopBtn.disabled = false;
                swapBtn.disabled = false;
                
                if (frontStream && backStream) {
                    status.innerHTML = '✅ 双摄像头已同时开启<br><small>后置（左）| 前置（右，已镜像）</small>';
                    status.className = 'status success';
                } else if (backStream) {
                    status.innerHTML = '⚠️ 只开启了一个摄像头<br><small>部分设备不支持同时调用双摄像头</small>';
                    status.className = 'status warning';
                }

            } catch (err) {
                status.innerHTML = '❌ 错误: ' + err.message + '<br><small>请确保已授予摄像头权限</small>';
                status.className = 'status error';
                startBtn.disabled = false;
                console.error('摄像头启动失败:', err);
            }
        }

        function stopCameras() {
            if (backStream) {
                backStream.getTracks().forEach(track => track.stop());
                backStream = null;
            }
            if (frontStream) {
                frontStream.getTracks().forEach(track => track.stop());
                frontStream = null;
            }

            backVideo.style.display = 'none';
            frontVideo.style.display = 'none';
            backPlaceholder.style.display = 'flex';
            frontPlaceholder.style.display = 'flex';
            backPlaceholder.innerHTML = '<span class="placeholder-icon">🎥</span><span class="placeholder-text">等待开启</span>';
            frontPlaceholder.innerHTML = '<span class="placeholder-icon">👤</span><span class="placeholder-text">等待开启</span>';

            startBtn.disabled = false;
            stopBtn.disabled = true;
            swapBtn.disabled = true;
            isSwapped = false;

            status.textContent = '摄像头已关闭';
            status.className = 'status';
        }

        function swapPositions() {
            const wrapper = document.querySelector('.cameras-wrapper');
            const boxes = wrapper.querySelectorAll('.camera-box');
            
            if (!isSwapped) {
                wrapper.insertBefore(boxes[1], boxes[0]);
            } else {
                wrapper.insertBefore(boxes[0], boxes[1]);
            }
            
            isSwapped = !isSwapped;
            status.innerHTML = isSwapped ? 
                '✅ 双摄像头已开启<br><small>前置（左）| 后置（右）</small>' : 
                '✅ 双摄像头已开启<br><small>后置（左）| 前置（右）</small>';
        }

        // 页面关闭时自动停止
        window.addEventListener('beforeunload', () => {
            stopCameras();
        });
    </script>
</body>
</html>
